<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#f6f6f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="sudo">
  <title>sudo</title>
  <style>
    :root{font-family:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;color:#111;background:#f6f6f2;font-synthesis:none}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:#f6f6f2}
    body{min-height:100svh;display:flex;justify-content:center;overflow-x:hidden}
    button{font:inherit;color:inherit;border:0;background:none;padding:0;cursor:pointer}
    .app{width:min(100%,460px);min-height:100svh;padding:max(18px,env(safe-area-inset-top)) 18px max(20px,env(safe-area-inset-bottom));display:flex;flex-direction:column}
    header{display:flex;justify-content:space-between;align-items:center;margin:6px 1px 18px}
    h1{font-size:30px;line-height:1;margin:0;letter-spacing:-1.3px;font-weight:760}
    .new{height:34px;padding:0 13px;border-radius:17px;background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.08);font-size:13px;font-weight:650}
    .meta{display:flex;justify-content:space-between;align-items:center;margin:0 2px 10px;font-size:13px}
    .difficulty{display:flex;background:#e6e6e1;border-radius:8px;padding:2px;gap:1px}
    .difficulty button{padding:5px 8px;border-radius:6px;color:#6c6c67;line-height:1}
    .difficulty button.active{background:#fff;color:#111;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .timer{font-variant-numeric:tabular-nums;color:#555}
    .board{width:100%;aspect-ratio:1;display:grid;grid-template-columns:repeat(9,1fr);border:2px solid #151515;background:#151515;gap:1px;touch-action:manipulation}
    .cell{position:relative;display:grid;place-items:center;background:#fff;min-width:0;font-size:clamp(18px,5.6vw,25px);font-weight:500;font-variant-numeric:tabular-nums}
    .cell:nth-child(3n){border-right:1px solid #151515}.cell:nth-child(9n){border-right:0}
    .cell:nth-child(n+19):nth-child(-n+27),.cell:nth-child(n+46):nth-child(-n+54){border-bottom:1px solid #151515}
    .cell.peer{background:#f0f0ec}.cell.same{background:#e8e8e2}.cell.selected{background:#dcdcd5}
    .cell.given{font-weight:700}.cell.user{color:#1765d8}.cell.error{color:#c53b32;background:#f8e7e4}
    .notes{position:absolute;inset:3px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);font-size:clamp(7px,2.1vw,10px);line-height:1;color:#444;font-weight:550}
    .notes span{display:grid;place-items:center}
    .toolbar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 8px 14px}
    .tool{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;color:#555}
    .tool .circle{width:44px;height:44px;border-radius:22px;background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.07);display:grid;place-items:center}
    .tool.active .circle{background:#111;color:#fff}.tool:disabled{opacity:.3}
    svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .pad{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-top:auto}
    .number{height:48px;border-radius:9px;background:#e4e4df;font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;transition:transform .06s ease,background .15s ease}
    .number:active{transform:scale(.94);background:#d4d4ce}.number.used{opacity:.32}
    .message{min-height:28px;text-align:center;margin:12px 0 0;font-size:13px;color:#555}
    .message.win{color:#111;font-weight:650}
    @media(max-height:700px){.app{padding-top:max(10px,env(safe-area-inset-top));padding-bottom:max(10px,env(safe-area-inset-bottom))}header{margin-bottom:10px}.toolbar{margin:12px 8px 10px}.tool .circle{width:38px;height:38px}.number{height:42px}.message{margin-top:7px}}
  </style>
</head>
<body>
<main class="app">
  <header><h1>sudo</h1><button class="new" id="newGame">New</button></header>
  <section class="meta">
    <div class="difficulty" aria-label="Difficulty">
      <button data-level="easy">easy</button><button data-level="medium">medium</button><button data-level="hard">hard</button>
    </div>
    <div class="timer" id="timer">00:00</div>
  </section>
  <section class="board" id="board" aria-label="Sudoku board"></section>
  <section class="toolbar">
    <button class="tool" id="undo"><span class="circle"><svg viewBox="0 0 24 24"><path d="M9 7 4 12l5 5"/><path d="M5 12h8a6 6 0 0 1 6 6"/></svg></span><span>Undo</span></button>
    <button class="tool" id="notes"><span class="circle"><svg viewBox="0 0 24 24"><path d="M5 19 19 5"/><path d="M8 5h11v11"/></svg></span><span>Notes</span></button>
    <button class="tool" id="erase"><span class="circle"><svg viewBox="0 0 24 24"><path d="m7 7 10 10M17 7 7 17"/></svg></span><span>Erase</span></button>
  </section>
  <section class="pad" id="pad" aria-label="Number pad"></section>
  <div class="message" id="message"></div>
</main>
<script>
(() => {
  const P = {
    easy: ['530070000600195000098000060800060003400803001700020006060000280000419005000080079','534678912672195348198342567859761423426853791713924856961537284287419635345286179'],
    medium: ['000260701680070090190004500820100040004602900050003028009300074040050036703018000','435269781682571493197834562826195347374682915951743628519326874248957136763418259'],
    hard: ['000000907000420180000705026100904000050000040000507009920108000034059000507000000','483651927659423187271795326162934875795812643348567219926178534834259761517346298']
  };
  const $ = s => document.querySelector(s);
  const boardEl = $('#board'), padEl = $('#pad'), timerEl = $('#timer'), messageEl = $('#message');
  const state = { level:'easy', puzzle:[], solution:[], board:[], notes:{}, selected:null, history:[], noteMode:false, seconds:0, won:false };
  let tick;

  function shuffled(a){ a=[...a]; for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a }
  function transform(puzzle, solution){
    const digits=shuffled([1,2,3,4,5,6,7,8,9]);
    const bands=shuffled([0,1,2]), stacks=shuffled([0,1,2]);
    const rows=bands.flatMap(b=>shuffled([0,1,2]).map(r=>b*3+r));
    const cols=stacks.flatMap(s=>shuffled([0,1,2]).map(c=>s*3+c));
    const map=s=>rows.flatMap(r=>cols.map(c=>{const n=+s[r*9+c];return n?digits[n-1]:0}));
    return [map(puzzle),map(solution)];
  }
  function snapshot(){ return {board:[...state.board],notes:JSON.parse(JSON.stringify(state.notes))} }
  function save(){ localStorage.setItem('sudo-state',JSON.stringify({...state,history:state.history.slice(-40)})) }
  function load(){
    try{const x=JSON.parse(localStorage.getItem('sudo-state')); if(x&&x.board?.length===81&&x.solution?.length===81){Object.assign(state,x);return true}}catch(e){} return false
  }
  function start(level=state.level){
    clearInterval(tick); const [p,s]=transform(...P[level]);
    Object.assign(state,{level,puzzle:p,solution:s,board:[...p],notes:{},selected:null,history:[],noteMode:false,seconds:0,won:false});
    setMessage(''); runTimer(); render(); save();
  }
  function runTimer(){ clearInterval(tick); if(state.won)return; tick=setInterval(()=>{state.seconds++; timerEl.textContent=formatTime(state.seconds); if(state.seconds%5===0)save()},1000) }
  function formatTime(n){const m=Math.floor(n/60),s=n%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
  function peers(a,b){return Math.floor(a/9)===Math.floor(b/9)||a%9===b%9||(Math.floor(a/27)===Math.floor(b/27)&&Math.floor(a%9/3)===Math.floor(b%9/3))}
  function setMessage(text,win=false){messageEl.textContent=text;messageEl.className='message'+(win?' win':'')}
  function select(i){state.selected=i;renderBoard()}
  function applyNumber(n){
    const i=state.selected;if(i===null||state.puzzle[i]||state.won)return;
    state.history.push(snapshot());
    if(state.noteMode){
      if(state.board[i])state.board[i]=0;
      const list=new Set(state.notes[i]||[]);list.has(n)?list.delete(n):list.add(n);state.notes[i]=[...list].sort();if(!state.notes[i].length)delete state.notes[i];
    }else{
      state.board[i]=n;delete state.notes[i];
      if(n===state.solution[i]){
        for(let j=0;j<81;j++)if(peers(i,j)&&state.notes[j]){state.notes[j]=state.notes[j].filter(x=>x!==n);if(!state.notes[j].length)delete state.notes[j]}
      }
    }
    checkWin();render();save();
  }
  function erase(){const i=state.selected;if(i===null||state.puzzle[i]||state.won)return;if(!state.board[i]&&!state.notes[i])return;state.history.push(snapshot());state.board[i]=0;delete state.notes[i];render();save()}
  function undo(){const x=state.history.pop();if(!x)return;state.board=x.board;state.notes=x.notes;state.won=false;setMessage('');runTimer();render();save()}
  function checkWin(){if(state.board.every((n,i)=>n===state.solution[i])){state.won=true;clearInterval(tick);setMessage(`Solved in ${formatTime(state.seconds)}`,true)}}
  function renderBoard(){
    const selectedValue=state.selected===null?0:state.board[state.selected];
    boardEl.innerHTML='';
    state.board.forEach((n,i)=>{
      const c=document.createElement('button');c.className='cell';c.setAttribute('aria-label',`Row ${Math.floor(i/9)+1}, column ${i%9+1}`);
      if(state.selected!==null&&peers(i,state.selected))c.classList.add('peer');
      if(selectedValue&&n===selectedValue)c.classList.add('same');
      if(i===state.selected)c.classList.add('selected');
      if(state.puzzle[i])c.classList.add('given');else if(n)c.classList.add('user');
      if(n&&n!==state.solution[i]&&!state.puzzle[i])c.classList.add('error');
      if(n)c.textContent=n;else if(state.notes[i]){const d=document.createElement('span');d.className='notes';for(let k=1;k<=9;k++){const x=document.createElement('span');x.textContent=state.notes[i].includes(k)?k:'';d.appendChild(x)}c.appendChild(d)}
      c.onclick=()=>select(i);boardEl.appendChild(c);
    });
  }
  function renderPad(){
    padEl.innerHTML='';for(let n=1;n<=9;n++){const b=document.createElement('button');b.className='number';b.textContent=n;b.onclick=()=>applyNumber(n);if(state.board.filter(x=>x===n).length>=9)b.classList.add('used');padEl.appendChild(b)}
  }
  function render(){
    timerEl.textContent=formatTime(state.seconds);renderBoard();renderPad();
    document.querySelectorAll('[data-level]').forEach(b=>b.classList.toggle('active',b.dataset.level===state.level));
    $('#notes').classList.toggle('active',state.noteMode);$('#undo').disabled=!state.history.length;
  }
  $('#newGame').onclick=()=>start();
  $('#undo').onclick=undo;$('#erase').onclick=erase;$('#notes').onclick=()=>{state.noteMode=!state.noteMode;render();save()};
  document.querySelectorAll('[data-level]').forEach(b=>b.onclick=()=>start(b.dataset.level));
  document.addEventListener('keydown',e=>{if(e.key>='1'&&e.key<='9')applyNumber(+e.key);else if(['Backspace','Delete','0'].includes(e.key))erase();else if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='z')undo();else if(e.key.toLowerCase()==='n'){state.noteMode=!state.noteMode;render()}});
  if(!load())start();else{if(state.won)setMessage(`Solved in ${formatTime(state.seconds)}`,true);runTimer();render()}
})();
</script>
</body>
</html>
